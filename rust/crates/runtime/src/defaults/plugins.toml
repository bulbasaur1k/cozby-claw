# cozby-claw plugin sources — git URLs (создано при первом запуске в ~/.claw/plugins.toml).
# `claw plugins sync` клонирует, собирает пакеты и ставит новые из этого списка.
# Установка остаётся ЯВНОЙ: на старте claw лишь сообщит «N новых плагинов — запусти sync».
#
# По умолчанию подключён наш плагин cozby-docs (Obsidian-документация по проектам).
# Поменяй URL, если репозиторий у тебя другой; удали строку, чтобы не ставить.
sources = [
  "https://github.com/bulbasaur1k/cozby-docs.git",
]
