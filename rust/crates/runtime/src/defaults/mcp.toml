# Дефолтные MCP-серверы claw (создано при первом запуске в ~/.claw/mcp.toml).
# Правь свободно — файл больше не перезаписывается. `claw mcp list` покажет активные.
#
# ВАЖНО: по умолчанию claw НЕ поднимает ничего, что ходит наружу — это дефолт для
# коммерческих / критичных / офлайн-проектов, где исходящие сигналы недопустимы.
# Серверы ниже ЗАКОММЕНТИРОВАНЫ. Раскомментируй нужное осознанно — все они
# отправляют запросы во внешние сервисы (Context7/веб). stdio-серверам нужен
# npx (Node) или uvx (пакет `uv`); если команды нет в PATH — сервер тихо
# пропускается (не запускается, без ошибок).

# --- Внешние (opt-in) — раскомментируй, если исходящий трафик допустим ---------

# [context7]
# # Актуальная документация библиотек по запросу (ходит в api.context7.com).
# # https://github.com/upstash/context7
# type = "stdio"
# command = "npx"
# args = ["-y", "@upstash/context7-mcp"]

# [fetch]
# # Скачать веб-страницу и отдать как markdown (произвольные исходящие HTTP).
# # https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
# type = "stdio"
# command = "uvx"
# args = ["mcp-server-fetch"]

# Примечание: sequential-thinking намеренно НЕ включён — для слабых моделей он
# бесполезен (только форматирует «мысли», жжёт контекст), см. заметки по проекту.
